<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ColdFog netH Physical Losses</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #ffffff;
      font-family: Inter, Arial, "Microsoft YaHei", sans-serif;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    svg {
      width: min(100vw, 1500px);
      height: auto;
      display: block;
      background: #ffffff;
    }
    text {
      dominant-baseline: middle;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 760" role="img" aria-label="ColdFog netH physical loss training diagram">
  <defs>
    <marker id="arrow-main" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f3a4a"/>
    </marker>
    <marker id="arrow-loss" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b45309"/>
    </marker>
    <marker id="arrow-update" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b91c1c"/>
    </marker>
    <style>
      .title { font-size: 25px; font-weight: 700; fill: #172033; }
      .box { fill: #ffffff; stroke: #2f3a4a; stroke-width: 1.6; rx: 5; }
      .input { fill: #eef6ff; }
      .net { fill: #effaf2; }
      .phys { fill: #f7f0ff; }
      .diff { fill: #f1f5ff; }
      .loss { fill: #fff7e8; stroke: #b45309; }
      .sum { fill: #fffdf7; stroke: #6b7280; }
      .update { fill: #fff1f1; stroke: #b91c1c; }
      .head { font-size: 15px; font-weight: 700; fill: #172033; }
      .small { font-size: 12px; fill: #4b5563; }
      .tiny { font-size: 11px; fill: #6b7280; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .arrow { fill: none; stroke: #2f3a4a; stroke-width: 1.55; marker-end: url(#arrow-main); }
      .loss-arrow { fill: none; stroke: #b45309; stroke-width: 1.45; marker-end: url(#arrow-loss); }
      .update-arrow { fill: none; stroke: #b91c1c; stroke-width: 1.6; stroke-dasharray: 7 6; marker-end: url(#arrow-update); }
      .label { font-size: 11px; fill: #374151; font-weight: 600; }
      .loss-label { font-size: 11px; fill: #92400e; font-weight: 700; }
      .update-label { font-size: 11px; fill: #991b1b; font-weight: 700; }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="760" fill="#ffffff"/>
  <text class="title" x="750" y="46" text-anchor="middle">ColdFog netH Physical Losses</text>

  <!-- Main forward path -->
  <rect class="box input" x="64" y="272" width="146" height="72"/>
  <text class="head" x="137" y="296" text-anchor="middle">Hazy input</text>
  <text class="small mono" x="137" y="322" text-anchor="middle">SR [-1, 1]</text>

  <rect class="box net" x="278" y="254" width="166" height="108"/>
  <text class="head" x="361" y="282" text-anchor="middle">netH</text>
  <text class="small" x="361" y="309" text-anchor="middle">MPRfusion</text>
  <text class="tiny mono" x="361" y="333" text-anchor="middle">finetune_netH</text>

  <rect class="box phys" x="512" y="248" width="186" height="120"/>
  <text class="head" x="605" y="274" text-anchor="middle">Physical heads</text>
  <text class="small mono" x="605" y="300" text-anchor="middle">out_J, out_T, out_A</text>
  <text class="small mono" x="605" y="325" text-anchor="middle">out_I = T J + (1-T) A</text>
  <text class="tiny" x="605" y="349" text-anchor="middle">hazy reconstruction</text>

  <rect class="box diff" x="774" y="258" width="184" height="100"/>
  <text class="head" x="866" y="284" text-anchor="middle">Condition</text>
  <text class="small mono" x="866" y="309" text-anchor="middle">concat(J, T)</text>
  <text class="tiny mono" x="866" y="333" text-anchor="middle">4 channels</text>

  <rect class="box diff" x="1034" y="248" width="198" height="120"/>
  <text class="head" x="1133" y="274" text-anchor="middle">DDPM / UNet</text>
  <text class="small mono" x="1133" y="300" text-anchor="middle">[condition, x_t]</text>
  <text class="small" x="1133" y="325" text-anchor="middle">predict noise</text>
  <text class="tiny mono" x="1133" y="349" text-anchor="middle">in_channel = 7</text>

  <rect class="box input" x="1302" y="272" width="134" height="72"/>
  <text class="head" x="1369" y="296" text-anchor="middle">Output</text>
  <text class="small" x="1369" y="322" text-anchor="middle">dehazed sample</text>

  <path class="arrow" d="M210 308 H278"/>
  <text class="label" x="234" y="292">hazy</text>
  <path class="arrow" d="M444 308 H512"/>
  <text class="label" x="459" y="292">forward</text>
  <path class="arrow" d="M698 308 H774"/>
  <text class="label" x="719" y="292">J,T</text>
  <path class="arrow" d="M958 308 H1034"/>
  <text class="label" x="975" y="292">conditioning</text>
  <path class="arrow" d="M1232 308 H1302"/>
  <text class="label" x="1247" y="292">sample</text>

  <!-- Supporting inputs -->
  <rect class="box input" x="914" y="122" width="142" height="62"/>
  <text class="head" x="985" y="145" text-anchor="middle">Clean HR</text>
  <text class="small mono" x="985" y="169" text-anchor="middle">x_start</text>

  <rect class="box input" x="520" y="506" width="172" height="72"/>
  <text class="head" x="606" y="530" text-anchor="middle">Depth + beta</text>
  <text class="small mono" x="606" y="556" text-anchor="middle">t_gt = exp(-beta d)</text>

  <path class="arrow" d="M985 184 V230 H1133 V248"/>
  <text class="label" x="1080" y="219">add noise</text>
  <path class="arrow" d="M137 344 V616 H562"/>
  <text class="label" x="222" y="608">hazy_input_01</text>

  <!-- Three loss branches -->
  <rect class="box loss" x="1006" y="462" width="254" height="76"/>
  <text class="head" x="1133" y="485" text-anchor="middle">l_pix</text>
  <text class="small mono" x="1133" y="510" text-anchor="middle">L1(noise, pred_noise)</text>
  <text class="tiny mono" x="1133" y="531" text-anchor="middle">+ 0.01 * FFT loss</text>

  <rect class="box loss" x="754" y="610" width="214" height="72"/>
  <text class="head" x="861" y="633" text-anchor="middle">loss_t</text>
  <text class="small mono" x="861" y="658" text-anchor="middle">L1(out_T, t_gt)</text>

  <rect class="box loss" x="440" y="610" width="214" height="72"/>
  <text class="head" x="547" y="633" text-anchor="middle">loss_asm</text>
  <text class="small mono" x="547" y="658" text-anchor="middle">L1(out_I, hazy)</text>

  <path class="loss-arrow" d="M1133 368 V462"/>
  <text class="loss-label" x="1148" y="415">noise + x0</text>
  <path class="loss-arrow" d="M648 368 C706 456 788 520 846 610"/>
  <text class="loss-label" x="746" y="503">out_T</text>
  <path class="loss-arrow" d="M606 578 C604 608 626 618 654 640"/>
  <text class="loss-label" x="627" y="598">target</text>
  <path class="loss-arrow" d="M568 368 C514 456 494 530 528 610"/>
  <text class="loss-label" x="506" y="503">out_I</text>
  <path class="loss-arrow" d="M562 616 H530 V610"/>

  <!-- Loss aggregation and update -->
  <rect class="box sum" x="1064" y="610" width="220" height="72"/>
  <text class="head" x="1174" y="633" text-anchor="middle">loss_total</text>
  <text class="small mono" x="1174" y="658" text-anchor="middle">l_pix + 0.01 L_t + 0.05 L_asm</text>

  <rect class="box update" x="1330" y="610" width="120" height="72"/>
  <text class="head" x="1390" y="633" text-anchor="middle">Update</text>
  <text class="small mono" x="1390" y="658" text-anchor="middle">optG.step()</text>

  <path class="loss-arrow" d="M1133 538 V610"/>
  <text class="loss-label" x="1147" y="574">1.0</text>
  <path class="loss-arrow" d="M968 646 H1064"/>
  <text class="loss-label" x="990" y="628">0.01</text>
  <path class="loss-arrow" d="M654 646 H1064"/>
  <text class="loss-label" x="818" y="628">0.05</text>
  <path class="loss-arrow" d="M1284 646 H1330"/>
  <text class="loss-label" x="1292" y="628">backward</text>

  <path class="update-arrow" d="M1390 610 C1432 92 1168 88 1133 248 C936 92 472 96 361 254"/>
  <text class="update-label" x="836" y="104">single backward/update path: netG + unfrozen netH</text>
</svg>
</body>
</html>
